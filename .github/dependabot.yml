# Dependabot version-update and security-update configuration.
# Native to GitHub: no app install required. Security updates are enabled
# separately in repo Settings > Code security ("Dependabot security updates").
version: 2
updates:
  # Rust crates (the Cargo manifest lives in src-tauri/).
  - package-ecosystem: "cargo"
    directory: "/src-tauri"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    # Wait for a release to age before proposing it. Aligns with pnpm's
    # minimum-release-age supply-chain policy (CI rejects just-published
    # packages) and avoids churning on same-day releases.
    cooldown:
      default-days: 7
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      cargo-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # JavaScript dependencies (pnpm is handled by the npm ecosystem).
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    # Wait for a release to age before proposing it. Aligns with pnpm's
    # minimum-release-age supply-chain policy (CI rejects just-published
    # packages) and avoids churning on same-day releases.
    cooldown:
      default-days: 7
    commit-message:
      prefix: "chore"
      include: "scope"
    ignore:
      # Keep @types/node on the Node major the app actually runs (Node 22, per
      # package.json engines / setup-node). Major bumps (e.g. 22 -> 26) type the
      # code against a runtime we don't use, so ignore semver-major updates and
      # let minor/patch updates track the 22.x line.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
    groups:
      npm-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions workflows (.github/workflows/).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    # Wait for a release to age before proposing it. Aligns with pnpm's
    # minimum-release-age supply-chain policy (CI rejects just-published
    # packages) and avoids churning on same-day releases.
    cooldown:
      default-days: 7
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      actions-minor-patch:
        update-types:
          - "minor"
          - "patch"
