commit-msg:
  commands:
    commitlint:
      run: pnpm exec commitlint --edit {1}

pre-commit:
  parallel: true
  commands:
    biome:
      glob: '*.{js,ts,jsx,tsx,json,css}'
      exclude: 'src/bindings.ts'
      run: pnpm exec biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true
    rustfmt:
      glob: 'src-tauri/**/*.rs'
      run: cargo fmt --manifest-path src-tauri/Cargo.toml
      stage_fixed: true
