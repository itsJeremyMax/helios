[advisories]
version = 2
yanked = "deny"
# Unmaintained-crate advisories with no safe upgrade available, all pulled in
# transitively by Tauri's Linux backend (gtk3/webkit2gtk bindings via
# tao/muda/wry) or by tauri-utils' `urlpattern` -> `unic-*` dependency chain.
# Revisit when Tauri migrates off gtk3/unic-*.
ignore = [
    "RUSTSEC-2024-0370", # proc-macro-error, via glib-macros (gtk3 stack)
    "RUSTSEC-2024-0411", # gtk-rs GTK3 bindings
    "RUSTSEC-2024-0412", # gtk-rs GTK3 bindings
    "RUSTSEC-2024-0413", # gtk-rs GTK3 bindings
    "RUSTSEC-2024-0414", # gtk-rs GTK3 bindings
    "RUSTSEC-2024-0415", # gtk-rs GTK3 bindings
    "RUSTSEC-2024-0416", # gtk-rs GTK3 bindings
    "RUSTSEC-2024-0417", # gtk-rs GTK3 bindings
    "RUSTSEC-2024-0418", # gtk-rs GTK3 bindings
    "RUSTSEC-2024-0419", # gtk-rs GTK3 bindings
    "RUSTSEC-2024-0420", # gtk-rs GTK3 bindings
    "RUSTSEC-2025-0075", # unic-char-range, via urlpattern (tauri-utils)
    "RUSTSEC-2025-0080", # unic-common, via urlpattern (tauri-utils)
    "RUSTSEC-2025-0081", # unic-char-property, via urlpattern (tauri-utils)
    "RUSTSEC-2025-0098", # unic-ucd-version, via urlpattern (tauri-utils)
    "RUSTSEC-2025-0100", # unic-ucd-ident, via urlpattern (tauri-utils)
    "RUSTSEC-2024-0436", # paste (unmaintained), via tauri-specta
]

[licenses]
version = 2
allow = ["MIT", "Apache-2.0", "Apache-2.0 WITH LLVM-exception", "BSD-2-Clause", "BSD-3-Clause", "ISC", "Zlib", "Unicode-3.0", "MPL-2.0", "CDLA-Permissive-2.0", "OpenSSL"]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
